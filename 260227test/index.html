<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixso HTML</title>
  <style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

ol,ul,menu {
  padding-inline-start: 0;
  list-style: none;
}

ol li::marker, ul li::before {
  letter-spacing: 0;
}

html {
  width: 100%;
  height: 100%;
}

body { 
  width: 100%;
  height: 100%;
  margin: 0;
  background-color: white;
}
    
span {
  word-break: break-word;
}

.frame-2_1 {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
  background-repeat: no-repeat;
  background-size: 100% 100%;
  background-position: center;
  background-image: url("http://localhost:3667/assets/75940ee6d388817badcecbe66cc6775d.png");
}

.rectangle-2_2 {
  width: 1920px;
  height: 59px;
  position: absolute;
  left: 0px;
  bottom: 0px;
  background-color: rgba(196, 196, 196, 1);
  opacity: 0.8999999761581421;
}

.rectangle-2_4 {
  width: 169px;
  height: 40px;
  position: absolute;
  left: 1736px;
  bottom: 9px;
  border-radius: 20px 20px 20px 20px;
  background-color: rgba(255, 103, 0, 1);
}

.rectangle-4_1 {
  width: 169px;
  height: 40px;
  position: absolute;
  left: 1522px;
  bottom: 9px;
  border-radius: 20px 20px 20px 20px;
  background-color: rgba(255, 255, 255, 1);
}

.rectangle-4_6 {
  width: 169px;
  height: 40px;
  position: absolute;
  left: 1308px;
  bottom: 9px;
  border-radius: 20px 20px 20px 20px;
  background-color: rgba(0, 119, 211, 1);
}

.container {
  width: 100%;
  height: 100%;
}

  </style>
</head>
<body>
<div class="container">
  <div id="2_1" class="frame-2_1">
    <div id="2_2" class="rectangle-2_2"></div>
    <div id="2_4" class="rectangle-2_4"></div>
    <div id="4_1" class="rectangle-4_1"></div>
    <div id="4_6" class="rectangle-4_6"></div>
  </div>
</div>
</body>
</html>
